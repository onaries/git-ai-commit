name: Auto Tag on Release Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  auto-tag:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: v${VERSION}"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${{ steps.version.outputs.tag }}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes with AI
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          TAG="${{ steps.version.outputs.tag }}"

          set +e
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(node dist/index.js tag "$TAG" --base-tag "$PREV_TAG" --message-only)
          else
            NOTES=$(node dist/index.js tag "$TAG" --message-only)
          fi
          STATUS=$?
          set -e

          if [ $STATUS -ne 0 ] || [ -z "$NOTES" ]; then
            echo "AI release notes generation failed. Falling back to git log summary."
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log --pretty=format:'- %s' "$PREV_TAG"..HEAD)
            else
              NOTES=$(git log --pretty=format:'- %s' -n 20)
            fi
          fi

          if [ -z "$NOTES" ]; then
            NOTES="- Release $TAG"
          fi

          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_MODE: gemini
          AI_MODEL: ${{ vars.AI_MODEL || 'gemini-3-flash-preview' }}

      - name: Create annotated tag with gh
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PAT_TOKEN secret is required. GITHUB_TOKEN-created tags do not trigger downstream tag workflows."
            exit 1
          fi

          TAG="${{ steps.version.outputs.tag }}"
          TARGET_SHA="${{ github.event.pull_request.merge_commit_sha || github.sha }}"
          NOTES="${{ steps.notes.outputs.NOTES }}"

          TAG_OBJECT_SHA=$(gh api repos/${{ github.repository }}/git/tags \
            -f tag="$TAG" \
            -f message="$NOTES" \
            -f object="$TARGET_SHA" \
            -f type=commit \
            --jq '.sha')

          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/$TAG" \
            -f sha="$TAG_OBJECT_SHA"

          echo "Created and pushed annotated tag: $TAG"
